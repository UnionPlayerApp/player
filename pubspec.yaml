name: union_player_app
description: A Union Player Flutter application.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+13

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  app_tracking_transparency: 2.0.1
  audio_service: 0.17.1
  audio_session: 0.1.5
  cloud_firestore: 2.4.0
  connectivity: 3.0.3
  cupertino_icons: 1.0.2
  equatable: 2.0.3
  firebase_analytics: 8.1.2
  firebase_core: 1.3.0
  firebase_crashlytics: 2.0.6
  flutter:
    sdk: flutter
  flutter_bloc: 7.1.0
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: 5.0.0
  flutter_svg: 0.22.0
  form_field_validator: 1.1.0
  intl: 0.17.0
  just_audio: 0.9.6
  koin_bloc: 0.1.2
  koin_flutter: ^0.11.0-nullsafety.0
  logger: 1.1.0
  marquee: 2.2.0
  path_provider: 2.0.2
  rxdart: 0.27.1
  shared_preferences: 2.0.7
  url_launcher: 6.0.3
  uuid: 3.0.4
  webview_flutter: 2.0.12
  xml: 5.2.0

dev_dependencies:
  flutter_launcher_icons: 0.9.2
#  flutter_test:
#    sdk: flutter

flutter:
  assets:
    - assets/images/
    - assets/localizations/en.json
    - assets/localizations/ru.json
    - assets/localizations/be.json
  uses-material-design: true

flutter_icons:
  ios: true
  android: true
  image_path_ios: "assets/images/union_radio_logo_1.png"
  image_path_android: "assets/images/union_radio_logo_1.png"